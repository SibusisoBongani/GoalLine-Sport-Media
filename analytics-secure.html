<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Login - GoalLine Sport Media</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo h1 {
      color: white;
      font-size: 28px;
      font-weight: 700;
    }
    
    .logo span {
      color: #f39c12;
    }
    
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    
    .login-box h2 {
      color: #1e3c72;
      margin-bottom: 10px;
      font-size: 24px;
      text-align: center;
    }
    
    .login-box p {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: #f39c12;
      box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.1);
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #f39c12;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-top: 10px;
    }
    
    .login-btn:hover {
      background: #e67e22;
    }
    
    .error-message {
      color: #e74c3c;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }
    
    .footer {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }
    
    .footer a {
      color: #f39c12;
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>GoalLine <span>Analytics</span></h1>
    </div>
    
    <div class="login-box">
      <h2>Secure Access</h2>
      <p>Enter your password to view analytics dashboard</p>
      
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" onkeypress="handleKeyPress(event)">
      </div>
      
      <button class="login-btn" id="loginBtn" onclick="checkPassword()">
        Access Dashboard
      </button>
      
      <div class="error-message" id="error"></div>
    </div>
    
    <div class="footer">
      <a href="index.html">← Back to GoalLine Sport Media</a>
    </div>
  </div>

  <script>
    // CHANGE THIS TO YOUR OWN PASSWORD!
    const CORRECT_PASSWORD = '@Rappsta20040105';  // You can change this to any password you want
    
    // Check if already authenticated
    if (sessionStorage.getItem('analytics_auth') === 'true') {
      window.location.href = 'analytics.html';
    }
    
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        checkPassword();
      }
    }
    
    function checkPassword() {
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('error');
      
      // Show loading state
      loginBtn.classList.add('loading');
      loginBtn.innerHTML = 'Verifying...';
      errorDiv.textContent = '';
      
      if (passwordInput.value === CORRECT_PASSWORD) {
        // Store authentication in session
        sessionStorage.setItem('analytics_auth', 'true');
        
        // Redirect to analytics dashboard
        window.location.href = 'analytics.html';
      } else {
        // Show error
        errorDiv.textContent = 'Incorrect password. Please try again.';
        
        // Reset button
        loginBtn.classList.remove('loading');
        loginBtn.textContent = 'Access Dashboard';
        
        // Clear password field
        passwordInput.value = '';
        passwordInput.focus();
      }
    }
  </script>
</body>
</html>
