<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Login - GoalLine Sport Media</title>
  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      width: 350px;
    }
    
    h2 {
      color: #1e3c72;
      text-align: center;
      margin-bottom: 30px;
    }
    
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: #f39c12;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    
    button:hover {
      background: #e67e22;
    }
    
    .error {
      color: #e74c3c;
      text-align: center;
      margin-top: 15px;
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #666;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>GoalLine Analytics</h2>
    <p style="text-align: center; color: #666; margin-bottom: 30px;">Enter your password to view analytics</p>
    
    <input type="password" id="password" placeholder="Enter your password" onkeypress="handleKeyPress(event)">
    <button onclick="checkPassword()">Access Dashboard</button>
    
    <div class="error" id="error"></div>
    
    <div class="back-link">
      <a href="index.html">← Back to GoalLine Sport Media</a>
    </div>
  </div>

  <script>
    // CHANGE THIS TO YOUR PASSWORD
    const CORRECT_PASSWORD = 'GoalLine2026';
    
    function checkPassword() {
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      
      if (password === CORRECT_PASSWORD) {
        sessionStorage.setItem('analytics_auth', 'true');
        window.location.href = 'analytics.html';
      } else {
        errorDiv.textContent = 'Incorrect password';
        document.getElementById('password').value = '';
      }
    }
    
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        checkPassword();
      }
    }
  </script>
</body>
</html>
